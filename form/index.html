<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback Form</title>
</head>
<body>

    <h2>Give Us Your Feedback</h2>

    <form action="/submit-feedback" method="POST">
        <div>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" placeholder="write your name" required>
        </div><br>

        <div>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required>
        </div><br>

        <div>
            <label for="country">Country:</label><br>
            <select id="country" name="country">
                <option value="usa">United States</option>
                <option value="uk">United Kingdom</option>
                <option value="canada">Canada</option>
                <option value="australia">Australia</option>
                <option value="other">Other</option>
            </select>
        </div><br>

        <div>
            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
            <input type="radio" id="other_gender" name="gender" value="other">
            <label for="other_gender">Other</label>
        </div><br>

        <div>
            <label for="rating">Rate us (1 to 5):</label><br>
            <input type="number" id="rating" name="rating" min="1" max="5" value="5">
        </div><br>

        <div>
            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="5" cols="30" placeholder="Tell us what you think..."></textarea>
        </div><br>

        <button type="submit">Send Your Message</button>
    </form>

</body>
</html>
